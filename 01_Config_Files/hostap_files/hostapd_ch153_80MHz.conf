# Basic Settings
interface=wlp1s0
driver=nl80211
ssid=Radxa_5G
hw_mode=a
channel=153

# Country and Regulatory Settings
country_code=ES
ieee80211d=1
ieee80211h=1
# Support for IEEE 802.11n (HT)
ieee80211n=1
ht_capab=[HT40-][SHORT-GI-40]

# Support for IEEE 802.11ac (VHT)
ieee80211ac=1
vht_capab=[VHT80][SHORT-GI-80]

# VHT Configuration (80 MHz)
vht_oper_chwidth=1
vht_oper_centr_freq_seg0_idx=155

# Enable WMM (QoS)
wmm_enabled=1

# Security Settings
auth_algs=1
wpa=2
wpa_passphrase=123456789
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Control Interface
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0
